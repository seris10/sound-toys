<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Spectrum Explorer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for in-browser JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling, true full screen */
            background-color: #0a0f19;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONS (Converted from Lucide/Custom to pure SVGs for standalone use) ---
        const IconBase = ({ d, className, children }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {d && <path d={d} />}
                {children}
            </svg>
        );

        const Activity = ({ className }) => <IconBase d="M22 12h-4l-3 9L9 3l-3 9H2" className={className} />;
        const Ear = ({ className }) => <IconBase d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0" className={className} />;
        const Radio = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="2"/><path d="M4.9 19.1a10 10 0 0 1 0-14.2M19.1 4.9a10 10 0 0 1 0 14.2M1.4 22.6a15 15 0 0 1 0-21.2M22.6 1.4a15 15 0 0 1 0 21.2"/></IconBase>;
        const Stethoscope = ({ className }) => <IconBase className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></IconBase>;
        const Vibrate = ({ className }) => <IconBase className={className}><path d="M2 8v8"/><path d="M22 8v8"/><path d="M6 5v14"/><path d="M18 5v14"/><rect width="8" height="18" x="8" y="3" rx="1"/></IconBase>;
        const MousePointer2 = ({ className }) => <IconBase className={className}><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></IconBase>;
        const CloudLightning = ({ className }) => <IconBase className={className}><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></IconBase>;
        const Users = ({ className }) => <IconBase className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>;
        const Music = ({ className }) => <IconBase className={className}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></IconBase>;
        const Bird = ({ className }) => <IconBase className={className}><path d="M16 7h.01"/><path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/><path d="m20 7 2 .5-2 .5"/><path d="M10 18v3"/><path d="M14 17.75V21"/><path d="M7 18a6 6 0 0 0 3.84-10.61"/></IconBase>;
        const Bug = ({ className }) => <IconBase className={className}><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3 3 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M17.47 9c1.93-.2 3.53-1.9 3.53-4"/><path d="M8 14H4"/><path d="M20 14h-4"/><path d="M10.12 19.46 8 21"/><path d="M13.88 19.46 16 21"/></IconBase>;
        const Baby = ({ className }) => <IconBase className={className}><circle cx="12" cy="12" r="10"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M12 16a3 3 0 0 1-3-3"/><path d="M12 16a3 3 0 0 0 3-3"/><path d="M12 4v2"/><path d="M9 5l1 2"/><path d="M15 5l-1 2"/></IconBase>;
        const Waves = ({ className }) => <IconBase className={className}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.6 2 5.2 2 2.5 0 2.5-2 5.2-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5.2 2 2.5 0 2.5-2 5.2-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5.2 2 2.5 0 2.5-2 5.2-2 1.3 0 1.9.5 2.5 1"/></IconBase>;

        const ElephantIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}>
                <path d="M4 10v6a2 2 0 002 2h2v-5M18 10v6a2 2 0 01-2 2h-2v-5" />
                <path d="M12 4c-3 0-6 2-6 5v5c0 1.5 1 3 3 4s3 2 3 5" />
                <path d="M12 4c3 0 6 2 6 5v5c0 1.5-1 3-3 4" />
                <circle cx="9" cy="9" r="0.5" fill="currentColor" />
                <circle cx="15" cy="9" r="0.5" fill="currentColor" />
                <path d="M2 8c0-3 3-4 5-4" />
                <path d="M22 8c0-3-3-4-5-4" />
            </svg>
        );

        const BatIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}>
                <path d="M12 10s-1 4-1 6c0 1.5 1 2 1 2s1-.5 1-2c0-2-1-6-1-6z" />
                <path d="M11 10c-2-3-6-4-9-2 2 4 4 6 9 2z" />
                <path d="M13 10c2-3 6-4 9-2-2 4-4 6-9 2z" />
                <path d="M10.5 7L9 4l2 2 1-1 1 1 2-2-1.5 3" />
            </svg>
        );

        const DolphinIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}>
                <path d="M3 15s3-3 7-3 5 2 8 4c1.5 1 3 0 3 0s-2-3-4-4c-3-1.5-6-3-9-1.5S3 15 3 15z" />
                <path d="M12 9s-1-4-3-4 2 4 2 4z" />
                <path d="M15 16s-2 2-4 1" />
            </svg>
        );

        const LiverIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}>
                <path d="M20 9c0-3-2-5-5-5-3 0-5 1.5-7 3C5.5 8.5 4 10.5 4 13c0 2 1 3 3 3 3 0 6-1 9-3 2.5-1.5 4-2.5 4-4z" />
                <path d="M12 14c2 1.5 4 2 6 1" />
            </svg>
        );

        const ThyroidIcon = ({ className }) => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className={className}>
                <path d="M12 9c-2-2-4.5-2-6.5 0-1.5 1.5-1.5 4 0 6 2 2 4.5 1 6.5-2 2 3 4.5 4 6.5 2 1.5-2 1.5-4.5 0-6-2-2-4.5-2-6.5 0z" />
                <path d="M12 9v4" />
            </svg>
        );

        // --- MAIN COMPONENT ---
        function SoundSpectrumExplorer() {
            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            
            const [targetRatio, setTargetRatio] = useState(0.2);
            const [currentRatio, setCurrentRatio] = useState(0.2);
            const [hasInteracted, setHasInteracted] = useState(false);
            const [audioOn, setAudioOn] = useState(false);
            const audioCtxRef = useRef(null);
            const oscRef = useRef(null);
            const gainRef = useRef(null);
            
            useEffect(() => {
                let animationFrameId;
                const updateRatio = () => {
                    setCurrentRatio((prev) => {
                        const diff = targetRatio - prev;
                        if (Math.abs(diff) < 0.001) return targetRatio;
                        return prev + diff * 0.08;
                    });
                    animationFrameId = requestAnimationFrame(updateRatio);
                };
                updateRatio();
                return () => cancelAnimationFrame(animationFrameId);
            }, [targetRatio]);

            const handleMouseMove = (e) => {
                if (!hasInteracted) setHasInteracted(true);
                if (!containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                setTargetRatio(Math.max(0, Math.min(1, x / rect.width)));
            };

            const handleTouchMove = (e) => {
                if (!hasInteracted) setHasInteracted(true);
                if (!containerRef.current || !e.touches[0]) return;
                const rect = containerRef.current.getBoundingClientRect();
                const x = e.touches[0].clientX - rect.left;
                setTargetRatio(Math.max(0, Math.min(1, x / rect.width)));
            };

            const minFreqLog = Math.log10(1);
            const maxFreqLog = Math.log10(15000000);
            const currentFreqLog = minFreqLog + currentRatio * (maxFreqLog - minFreqLog);
            const actualFrequency = Math.pow(10, currentFreqLog);

            // Pick a playback frequency inside a safe audible band by shifting
            // the native frequency in octaves. Cap the upper end at ~6 kHz so
            // a sweep into ultrasound doesn't blast a piercing tone.
            const PLAY_LO = 60, PLAY_HI = 6000;
            const playback = useMemo(() => {
                let f = actualFrequency;
                let octaves = 0;
                while (f < PLAY_LO) { f *= 2; octaves += 1; }
                while (f > PLAY_HI) { f /= 2; octaves -= 1; }
                return { hz: f, octaves };
            }, [actualFrequency]);

            // Drive an oscillator when audio is on. Created lazily so we
            // never start a context before user interaction.
            useEffect(() => {
                if (!audioOn) return;
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return;
                const ctx = new Ctx();
                const osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = playback.hz;
                const g = ctx.createGain();
                g.gain.value = 0;
                osc.connect(g).connect(ctx.destination);
                osc.start();
                g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.15);
                audioCtxRef.current = ctx;
                oscRef.current = osc;
                gainRef.current = g;
                return () => {
                    try {
                        g.gain.cancelScheduledValues(ctx.currentTime);
                        g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
                        setTimeout(() => { try { osc.stop(); ctx.close(); } catch (e) {} }, 120);
                    } catch (e) {}
                    audioCtxRef.current = null;
                    oscRef.current = null;
                    gainRef.current = null;
                };
            }, [audioOn]);

            useEffect(() => {
                if (oscRef.current && audioCtxRef.current) {
                    oscRef.current.frequency.setTargetAtTime(
                        playback.hz, audioCtxRef.current.currentTime, 0.02
                    );
                }
            }, [playback.hz]);

            const toggleAudio = () => setAudioOn((v) => !v);

            const activeCategory = useMemo(() => {
                if (actualFrequency < 20) return { id: 'infra', name: 'Infrasound', color: '239, 68, 68' }; 
                if (actualFrequency < 20000) return { id: 'audible', name: 'Audible', color: '234, 179, 8' }; 
                if (actualFrequency < 2000000) return { id: 'ultra', name: 'Ultrasound', color: '59, 130, 246' }; 
                return { id: 'medical', name: 'Diagnostic Imaging', color: '16, 185, 129' }; 
            }, [actualFrequency]);

            const currentDetail = useMemo(() => {
                const hz = actualFrequency;
                if (hz < 5) return { type: 'SOURCE', title: 'Earthquakes & Tectonics', icon: Activity, desc: 'Massive, global shockwaves' };
                if (hz < 20) return { type: 'SOURCE', title: 'Elephants & Whales', icon: ElephantIcon, desc: 'Long-distance communication' };
                
                if (hz < 80) return { type: 'SOURCE', title: 'Thunder & Heavy Bass', icon: CloudLightning, desc: 'Deep, vibrating resonance' };
                if (hz < 1000) return { type: 'SOURCE', title: 'Human Speech', icon: Users, desc: 'Normal conversational range' };
                if (hz < 5000) return { type: 'SOURCE', title: 'Instruments & Song', icon: Music, desc: 'Pianos, guitars, and brass' };
                if (hz < 12000) return { type: 'SOURCE', title: 'Birdsong & Whistles', icon: Bird, desc: 'Sharp, high-pitched tones' };
                if (hz < 20000) return { type: 'SOURCE', title: 'Mosquitoes', icon: Bug, desc: 'High whine at the edge of hearing' };
                
                if (hz < 80000) return { type: 'SOURCE', title: 'Bat Echolocation', icon: BatIcon, desc: 'Used for hunting in the dark' };
                if (hz < 500000) return { type: 'SOURCE', title: 'Dolphins', icon: DolphinIcon, desc: 'High-speed underwater sonar' };
                if (hz < 2000000) return { type: 'SOURCE', title: 'Industrial Testing', icon: Waves, desc: 'Finding flaws in solid metal' };
                
                if (hz < 5000000) return { type: 'CLINICAL TARGET', title: 'Deep Abdomen (Liver/Aorta)', icon: LiverIcon, desc: 'Required: Max penetration (15-20cm)' };
                if (hz < 9000000) return { type: 'CLINICAL TARGET', title: 'Obstetrics & Pediatrics', icon: Baby, desc: 'Balance: Res & Pen (8-12cm)' };
                return { type: 'CLINICAL TARGET', title: 'Superficial (Thyroid/Breast)', icon: ThyroidIcon, desc: 'Required: Max resolution (1-4cm)' };
            }, [actualFrequency]);

            const formatHz = (hz) => {
                if (hz < 1000) return `${Math.round(hz)} Hz`;
                if (hz < 1000000) return `${(hz / 1000).toFixed(1)} kHz`;
                return `${(hz / 1000000).toFixed(2)} MHz`;
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let time = 0;

                const render = () => {
                    const rect = canvas.parentElement.getBoundingClientRect();
                    if (canvas.width !== rect.width || canvas.height !== rect.height) {
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                    }
                    
                    const w = canvas.width;
                    const h = canvas.height;
                    
                    const surfaceY = 220;
                    const maxDepthCm = 24;
                    const availableHeight = h - surfaceY - 80; 
                    const pxPerCm = availableHeight / maxDepthCm;

                    ctx.fillStyle = `rgba(10, 15, 25, 1)`;
                    ctx.fillRect(0, 0, w, h);

                    let penetrationCm = 24; 
                    if (actualFrequency > 20000 && actualFrequency <= 2000000) {
                        const p = (Math.log10(actualFrequency) - Math.log10(20000)) / (Math.log10(2000000) - Math.log10(20000));
                        penetrationCm = 24 - (p * 6);
                    } else if (actualFrequency > 2000000) {
                        const p = (Math.log10(actualFrequency) - Math.log10(2000000)) / (Math.log10(15000000) - Math.log10(2000000));
                        penetrationCm = 18 - (p * 15);
                    }

                    const amplitude = penetrationCm * pxPerCm; 
                    const visualFreq = 1 + (Math.pow(currentRatio, 2) * 200); 
                    const speed = 2 + (currentRatio * 15);
                    
                    time += 0.01 * speed;

                    let shakeY = 0;
                    if (currentRatio < 0.15) {
                        const shakeIntensity = (0.15 - currentRatio) * 8;
                        shakeY = (Math.random() - 0.5) * shakeIntensity;
                    }

                    ctx.save();
                    ctx.translate(0, shakeY);
                    
                    ctx.beginPath();
                    ctx.rect(0, surfaceY, w, availableHeight + 100);
                    ctx.clip();

                    const numWaves = 3;
                    for (let j = 0; j < numWaves; j++) {
                        ctx.beginPath();
                        ctx.lineWidth = j === 0 ? 3 : 1.5;
                        const alpha = j === 0 ? 0.8 : 0.3;
                        ctx.strokeStyle = `rgba(${activeCategory.color}, ${alpha})`;
                        
                        ctx.shadowBlur = j === 0 ? 15 : 5;
                        ctx.shadowColor = `rgba(${activeCategory.color}, 0.8)`;

                        const phaseOffset = j * (Math.PI / 3);

                        for (let x = 0; x < w; x += 4) {
                            const normalizedX = x / w;
                            const envelopeX = Math.sin(normalizedX * Math.PI); 
                            
                            const rawWave = Math.sin(normalizedX * visualFreq * Math.PI * 2 - time + phaseOffset);
                            const y = surfaceY + Math.abs(rawWave) * amplitude * envelopeX;
                            
                            if (x === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        ctx.stroke();
                    }
                    ctx.restore();

                    ctx.save();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.font = '13px sans-serif';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.lineWidth = 1;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, surfaceY);
                    ctx.lineTo(w, surfaceY);
                    ctx.stroke();
                    ctx.fillText("0 cm (Surface)", w * 0.08, surfaceY - 12);

                    for (let cm = 4; cm <= maxDepthCm; cm += 4) {
                        const y = surfaceY + (cm * pxPerCm);
                        ctx.beginPath();
                        ctx.moveTo(w * 0.05, y);
                        ctx.lineTo(w * 0.05 + 15, y);
                        ctx.stroke();
                        ctx.fillText(`${cm} cm`, w * 0.05 - 10, y);
                    }

                    const penY = surfaceY + (penetrationCm * pxPerCm);
                    ctx.beginPath();
                    ctx.setLineDash([5, 5]);
                    ctx.strokeStyle = `rgb(${activeCategory.color})`;
                    ctx.lineWidth = 2;
                    ctx.moveTo(w * 0.08, penY);
                    ctx.lineTo(w * 0.92, penY);
                    ctx.stroke();
                    
                    ctx.setLineDash([]);
                    ctx.fillStyle = `rgb(${activeCategory.color})`;
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText(`MAX PENETRATION DEPTH`, w * 0.08 + 10, penY - 10);
                    
                    ctx.restore();

                    animationFrameId = requestAnimationFrame(render);
                };

                render();
                return () => cancelAnimationFrame(animationFrameId);
            }, [currentRatio, activeCategory]);

            return (
                <div 
                    ref={containerRef}
                    className="relative w-full h-full bg-[#0a0f19] overflow-hidden select-none font-sans cursor-crosshair touch-none"
                    onMouseMove={handleMouseMove}
                    onTouchMove={handleTouchMove}
                >
                    <canvas ref={canvasRef} className="absolute inset-0 w-full h-full z-0" />

                    <button
                        type="button"
                        onClick={(e) => { e.stopPropagation(); toggleAudio(); }}
                        className={`absolute z-40 bottom-24 right-6 md:bottom-32 md:right-10 rounded-full px-4 py-2 text-xs md:text-sm font-semibold tracking-wide backdrop-blur-md border transition-all ${audioOn
                            ? 'bg-white/15 border-white/30 text-white'
                            : 'bg-slate-900/70 border-white/10 text-slate-300 hover:bg-slate-800/70'}`}
                        style={{ pointerEvents: 'auto' }}
                        aria-pressed={audioOn}
                    >
                        {audioOn ? 'Sound on' : 'Tap for sound'}
                    </button>


                    <div className="absolute top-0 left-0 w-full md:w-1/2 p-6 md:p-10 pointer-events-none z-20 flex flex-col items-start bg-gradient-to-b from-[#0a0f19] to-transparent h-64">
                        <div className="flex items-center space-x-4">
                            <Activity className="w-6 h-6 text-slate-400" />
                            <h2 className="text-slate-400 text-xl uppercase tracking-widest font-semibold">Spectrum Explorer</h2>
                        </div>
                        
                        <div className="mt-2 flex flex-col items-start">
                            <div className="text-6xl md:text-8xl font-black tabular-nums tracking-tighter" style={{ color: `rgb(${activeCategory.color})`, textShadow: `0 0 40px rgba(${activeCategory.color}, 0.5)`}}>
                                {formatHz(actualFrequency)}
                            </div>
                            <div className="text-2xl md:text-4xl font-light text-slate-200 tracking-tight">
                                {activeCategory.name}
                            </div>
                            {audioOn && playback.octaves !== 0 && (
                                <div className="mt-2 text-xs md:text-sm text-slate-400 font-mono">
                                    heard at {formatHz(playback.hz)}
                                    {playback.octaves > 0
                                        ? ` (pitched up ${Math.pow(2, playback.octaves)}×)`
                                        : ` (pitched down ${Math.pow(2, -playback.octaves)}×)`}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="absolute top-6 right-6 md:top-10 md:right-10 pointer-events-none z-30">
                        <div 
                            key={currentDetail.title} 
                            className="bg-slate-900/80 backdrop-blur-xl border border-white/10 rounded-2xl p-5 shadow-2xl flex items-center space-x-5 transition-all duration-500 w-[300px] md:w-[380px]"
                            style={{ boxShadow: `0 10px 40px -10px rgba(${activeCategory.color}, 0.3)` }}
                        >
                            <div className="relative flex-shrink-0">
                                <div className="absolute inset-0 rounded-full animate-ping opacity-20" style={{ backgroundColor: `rgb(${activeCategory.color})` }} />
                                <div className="w-14 h-14 rounded-full flex items-center justify-center relative z-10" style={{ backgroundColor: `rgba(${activeCategory.color}, 0.15)`, color: `rgb(${activeCategory.color})` }}>
                                    <currentDetail.icon className="w-7 h-7" />
                                </div>
                            </div>
                            
                            <div className="flex flex-col flex-1">
                                <span className="text-[10px] md:text-xs font-bold uppercase tracking-widest mb-1" style={{ color: `rgb(${activeCategory.color})` }}>
                                    {currentDetail.type}
                                </span>
                                <h3 className="text-white font-bold text-lg leading-tight mb-1">
                                    {currentDetail.title}
                                </h3>
                                <p className="text-slate-400 text-xs md:text-sm leading-snug">
                                    {currentDetail.desc}
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="absolute bottom-0 left-0 w-full p-6 md:p-10 pointer-events-none z-20 bg-gradient-to-t from-[#0a0f19] via-[#0a0f19]/90 to-transparent">
                        
                        <div className="mb-6 h-36 md:h-32 flex items-end">
                            {activeCategory.id === 'infra' && (
                                <div className="space-y-2 transition-opacity duration-500">
                                    <h3 className="text-xl font-semibold text-white">Maximum Penetration</h3>
                                    <p className="text-slate-300 text-base max-w-xl">Below 20 Hz. Notice the penetration line reaches the very bottom of the screen. Great for long distances, but terrible for detailed resolution.</p>
                                </div>
                            )}
                            {activeCategory.id === 'audible' && (
                                <div className="space-y-2 transition-opacity duration-500">
                                    <h3 className="text-xl font-semibold text-white">Human Hearing Range</h3>
                                    <p className="text-slate-300 text-base max-w-xl">20 Hz to 20 kHz. As frequency increases, the waves get tighter and penetration depth begins to shrink.</p>
                                </div>
                            )}
                            {activeCategory.id === 'ultra' && (
                                <div className="space-y-2 transition-opacity duration-500">
                                    <h3 className="text-xl font-semibold text-white">Entering Ultrasound</h3>
                                    <p className="text-slate-300 text-base max-w-xl">Above 20 kHz. Too rapid for human hearing. Animals use this because the tighter waves bounce off small objects (insects) better than low frequencies.</p>
                                </div>
                            )}
                            {activeCategory.id === 'medical' && (
                                <div className="space-y-2 transition-opacity duration-500 max-w-2xl bg-emerald-950/40 p-4 rounded-xl border border-emerald-500/30 backdrop-blur-sm">
                                    <h3 className="text-xl font-semibold text-emerald-400">The SPI Trade-off</h3>
                                    <p className="text-emerald-100/90 text-sm mt-1">
                                        Watch the dotted <strong className="text-white">Max Penetration</strong> line. As you approach 15 MHz, it moves up rapidly. High frequencies provide perfect detail for superficial organs, but simply cannot reach deep structures.
                                    </p>
                                </div>
                            )}
                        </div>

                        <div className="relative w-full h-12 flex items-center">
                            <div className="absolute w-full h-1.5 bg-slate-800 rounded-full overflow-hidden shadow-inner">
                                <div 
                                    className="h-full transition-all duration-100 ease-out" 
                                    style={{ width: `${currentRatio * 100}%`, backgroundColor: `rgb(${activeCategory.color})` }}
                                />
                            </div>
                            <div 
                                className="absolute w-5 h-10 -mt-5 rounded-full border-2 border-white bg-slate-900 shadow-[0_0_15px_rgba(255,255,255,0.4)] transition-all duration-75 flex items-center justify-center"
                                style={{ left: `calc(${currentRatio * 100}% - 10px)`, borderColor: `rgb(${activeCategory.color})` }}
                            >
                                <div className="w-1 h-4 bg-slate-400 rounded-full" />
                            </div>
                            <div className="absolute w-full flex justify-between top-5 text-xs font-bold text-slate-500 tracking-widest uppercase">
                                <span>1 Hz</span>
                                <span className="hidden md:inline">Audible (20 Hz)</span>
                                <span className="hidden md:inline">Ultrasound (20 kHz)</span>
                                <span>15 MHz</span>
                            </div>
                        </div>
                    </div>

                    <div className={`absolute inset-0 z-40 flex items-center justify-center bg-[#0a0f19]/80 backdrop-blur-sm transition-opacity duration-1000 pointer-events-none ${hasInteracted ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="flex flex-col items-center animate-bounce">
                            <MousePointer2 className="w-10 h-10 text-white mb-4 drop-shadow-lg" />
                            <h1 className="text-4xl md:text-5xl font-bold text-white tracking-tight text-center px-4">Scrub to explore</h1>
                            <p className="text-slate-300 mt-3 text-lg font-light">Watch the targets in the top right</p>
                        </div>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SoundSpectrumExplorer />);
    </script>
</body>
</html>
